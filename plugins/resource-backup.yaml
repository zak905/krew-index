apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: resource-backup
spec:
  version: v0.2.7
  homepage: https://github.com/zak905/kubectl-resource-backup
  shortDescription: Save Kubernetes resources to disk
  description: |
    Backs up Kubernetes objects (including CRDs) to the local file system. 
    Before saving any resource, some additional processing is done to remove:
    - the status stanza if the object has any.
    - the server generated fields from the object metadata. 
    - any field with a null value.
    The aims is to make the saved objects look like the original creation request.
  caveats: |
    The fields that has a default value are not removed (unlike the neat plugin)  
    because it's not possible to make a distinction between a value set 
    by a creation/update request and a value set by a controller 
    or a mutating admission webhook.
  platforms:
  - selector:
      matchLabels:
        os: darwin
        arch: amd64
    uri: https://github.com/zak905/kubectl-resource-backup/releases/download/v0.2.7/kubectl-resource-backup_darwin_amd64.tar.gz
    sha256: 2b3319d517d99a8b5b5346fe9cc1329e6a19657bcf63a3e9541d29e58a4c1fbc
    bin: kubectl-resource-backup
  - selector:
      matchLabels:
        os: darwin
        arch: arm64
    uri: https://github.com/zak905/kubectl-resource-backup/releases/download/v0.2.7/kubectl-resource-backup_darwin_arm64.tar.gz
    sha256: 80ebe28628474a38dcb030ec3360c27041fb20e726fb8230c63063aac74a2381
    bin: kubectl-resource-backup
  - selector:
      matchLabels:
        os: linux
        arch: amd64
    uri: https://github.com/zak905/kubectl-resource-backup/releases/download/v0.2.7/kubectl-resource-backup_linux_amd64.tar.gz
    sha256: 668c8012bc840b0d6dca79bb1f53810fcea9c0ed14d4df8d46d59cf94e947327
    bin: kubectl-resource-backup
  - selector:
      matchLabels:
        os: linux
        arch: arm64
    uri: https://github.com/zak905/kubectl-resource-backup/releases/download/v0.2.7/kubectl-resource-backup_linux_arm64.tar.gz
    sha256: 1b904aaeb938568c56a9bae028c5e74286194e7a89f77460e2975cd4b752cb5f
    bin: kubectl-resource-backup
  - selector:
